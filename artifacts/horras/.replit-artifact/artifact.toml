kind = "web"
previewPath = "/"
title = "Horras - حراس"
version = "1.0.0"
id = "artifacts/horras"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25227

[services.development]
run = "pnpm --filter @workspace/horras run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/horras", "run", "build" ]
publicDir = "artifacts/horras/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25227"
BASE_PATH = "/"
