<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0A0A0A"/>
  <!-- Outer glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield body filled -->
  <path d="M16 3.5L6 8v8c0 5.8 4.5 11.2 10 12.5 5.5-1.3 10-6.7 10-12.5V8L16 3.5z" fill="#FFB800" fill-opacity="0.15"/>
  <!-- Shield stroke -->
  <path d="M16 3.5L6 8v8c0 5.8 4.5 11.2 10 12.5 5.5-1.3 10-6.7 10-12.5V8L16 3.5z" stroke="#FFB800" stroke-width="1.6" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Checkmark -->
  <path d="M11.5 15.5l3 3 6-6" stroke="#FFB800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
